<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Art Gallery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-container">
        <h2>Hoş Geldiniz</h2>

        <div id="loginAlert" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-posta</label>
                <input type="email" id="email" required placeholder="E-posta adresiniz">
            </div>
            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" required placeholder="Şifreniz">
            </div>
            <button type="submit" class="btn">Giriş Yap</button>
        </form>

        <div class="auth-links">
            Hesabın yok mu? <a href="register.html">Kayıt Ol</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
