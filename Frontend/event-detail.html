<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Etkinlik Detayı - Art Gallery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: block; background-color: #f4f4f9;">
    <nav class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">Art Gallery</a>
        <div class="user-menu"><a href="events.html" style="color: white;">Geri Dön</a></div>
    </nav>

    <main class="container">
        <div id="eventDetailContent" class="box" style="max-width: 800px; margin: auto;">
            <p>Yükleniyor...</p>
        </div>

        <hr style="margin: 40px 0; border: 1px solid #ddd;">

        <div class="box" style="max-width: 800px; margin: auto;">
            <h2>Değerlendirmeler ve Yorumlar</h2>

            <div style="background-color: #fdfbfb; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee;">
                <h4 style="margin-bottom: 10px;">Yorum Yap</h4>
                <form id="commentForm">
                    <div class="form-group">
                        <select id="commentRating" class="form-group" style="padding: 8px; width: 100%; max-width: 200px;" required>
                            <option value="">Puan Seçin...</option>
                            <option value="5">⭐⭐⭐⭐⭐ (5) Harika</option>
                            <option value="4">⭐⭐⭐⭐ (4) İyi</option>
                            <option value="3">⭐⭐⭐ (3) Orta</option>
                            <option value="2">⭐⭐ (2) Kötü</option>
                            <option value="1">⭐ (1) Berbat</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <textarea id="commentText" rows="3" placeholder="Etkinlik hakkında ne düşünüyorsunuz?" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc;" required></textarea>
                    </div>
                    <button type="submit" class="btn" style="width: auto; padding: 8px 20px;">Yorumu Gönder</button>
                </form>
            </div>

            <div id="commentList">
                <p style="color: #7f8c8d;">Yorumlar yükleniyor...</p>
            </div>
        </div>
    </main>

    <script src="js/event-detail.js"></script>
</body>
</html>
