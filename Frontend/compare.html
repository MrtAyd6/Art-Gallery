<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Karşılaştırma - Art Gallery</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .compare-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); text-align: center; }
        .compare-table th, .compare-table td { padding: 15px; border: 1px solid #ddd; }
        .compare-table th { background-color: #2c3e50; color: white; width: 33%; }
        .compare-table tr:nth-child(even) { background-color: #f9f9f9; }
        .highlight { background-color: #e8f8f5; font-weight: bold; color: #27ae60; }
    </style>
</head>
<body style="display: block; background-color: #f4f4f9;">
    <nav class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">Art Gallery</a>
        <div class="user-menu">
            <a href="events.html" style="color: white; text-decoration: none;">Atölyeler</a>
        </div>
    </nav>

    <main class="container">
        <h2>Etkinlik ve Atölye Karşılaştırma</h2>
        <p style="color: #7f8c8d; margin-bottom: 20px;">Hangi atölyenin size daha uygun olduğunu bulmak için iki etkinlik seçin.</p>
        <div style="display: flex; gap: 20px; margin-bottom: 20px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);">
            <select id="event1" class="form-group" style="flex: 1; padding: 10px;"></select>
            <select id="event2" class="form-group" style="flex: 1; padding: 10px;"></select>
            <button onclick="compareEvents()" class="btn" style="width: auto; padding: 0 30px;">Karşılaştır</button>
        </div>

        <div id="comparisonResult" style="display: none;">
            <table class="compare-table">
                <thead>
                    <tr>
                        <th>Özellik</th>
                        <th id="title1">1. Etkinlik</th>
                        <th id="title2">2. Etkinlik</th>
                    </tr>
                </thead>
                <tbody id="compareBody">
                    </tbody>
            </table>

            <div style="text-align: right; margin-top: 15px;">
                <button onclick="saveComprasion()" class="btn-outline">Sonucu Kaydet</button>
            </div>
        </div>
    </main>

    <script src="js/compare.js"></script>
</body>
</html>
